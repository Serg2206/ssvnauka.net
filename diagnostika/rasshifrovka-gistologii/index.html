          disclaimerLabel: "Important:",
          disclaimerText: "interpretation does not replace slide/block review by a pathologist or an in-person clinical consultation."
        }
      };

      function getLangFromUrl() {
        var fromQuery = new URLSearchParams(window.location.search).get("_lang");
        if (fromQuery && copy[fromQuery]) return fromQuery;

        var htmlLang = (document.documentElement.getAttribute("lang") || "").toLowerCase();
        if (htmlLang === "uk") return "uk";
        if (htmlLang === "en") return "en";
        return "ru";
      }

      function setItems(containerId, items) {
        var container = document.getElementById(containerId);
        container.innerHTML = "";
        items.forEach(function (item) {
          var li = document.createElement("li");
          li.textContent = item;
          container.appendChild(li);
        });
      }

      function setExamples(items) {
        var grid = document.getElementById("examplesGrid");
        grid.innerHTML = "";
        items.forEach(function (example) {
          var article = document.createElement("article");
          article.className = "service-card";

          var h3 = document.createElement("h3");
          h3.textContent = example.term;
          var p = document.createElement("p");
          p.textContent = example.explanation;

          article.appendChild(h3);
          article.appendChild(p);
          grid.appendChild(article);
        });
      }

      function setRelated(items) {
        var list = document.getElementById("relatedItems");
        list.innerHTML = "";
        items.forEach(function (item) {
          var li = document.createElement("li");
          var a = document.createElement("a");
          a.href = item.href;
          a.textContent = item.label;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          li.appendChild(a);
          list.appendChild(li);
        });
      }

      function applyLanguage(lang) {
        var c = copy[lang] || copy.ru;

        document.documentElement.lang = lang;
        document.title = c.title + " | ssvnauka.net";

        document.getElementById("kicker").textContent = c.kicker;
        document.getElementById("title").textContent = c.title;
        document.getElementById("description").textContent = c.description;
        document.getElementById("clinicLink").textContent = c.clinicCta;
        document.getElementById("botCta").textContent = c.botCta;
        document.getElementById("consultLink").textContent = c.consultCta;

        document.getElementById("discussTitle").textContent = c.discussTitle;
        document.getElementById("receiveTitle").textContent = c.receiveTitle;
        document.getElementById("examplesTitle").textContent = c.examplesTitle;
        document.getElementById("relatedTitle").textContent = c.relatedTitle;
        document.getElementById("contactsLine").textContent = c.contactsLine;
        document.getElementById("disclaimerLabel").textContent = c.disclaimerLabel;
        document.getElementById("disclaimerText").textContent = c.disclaimerText;

        setItems("discussItems", c.discussItems);
        setItems("receiveItems", c.receiveItems);
        setExamples(c.examples);
        setRelated(c.relatedItems);

        var buttons = document.querySelectorAll("button[data-lang]");
        buttons.forEach(function (button) {
          var active = button.getAttribute("data-lang") === lang;
          button.classList.toggle("is-active", active);
          button.setAttribute("aria-pressed", active ? "true" : "false");
        });

        var url = new URL(window.location.href);
        url.searchParams.set("_lang", lang);
        window.history.replaceState({}, "", url.toString());
      }

      document.querySelectorAll("button[data-lang]").forEach(function (button) {
        button.addEventListener("click", function () {
          var lang = button.getAttribute("data-lang");
          if (lang && copy[lang]) {
            applyLanguage(lang);
          }
        });
      });

      applyLanguage(getLangFromUrl());
    })();
  </script>
